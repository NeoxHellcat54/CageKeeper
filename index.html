<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CageKeeper Fresh Start</title><style>html,body{margin:0;min-height:100%;background:#030305;color:#f4eef8;font-family:system-ui,Segoe UI,Arial,sans-serif}.wrap{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px}h1{font-family:Georgia,serif;letter-spacing:.18em;text-transform:uppercase;font-weight:500}.btn{display:inline-block;margin-top:18px;border:1px solid rgba(230,90,169,.35);border-radius:14px;padding:12px 16px;color:#fff;text-decoration:none;background:linear-gradient(135deg,rgba(230,90,169,.22),rgba(125,92,255,.16))}small{color:#9d92a8}</style></head><body><div class="wrap"><div><h1>CageKeeper</h1><p>Clearing old cached files…</p><small>This fixes stale service-worker CSS from earlier builds.</small><br><a class="btn" id="go" href="index.html?v=0.2.2-fresh">Open CageKeeper</a></div></div><script>(async()=>{try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}if('caches'in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)));}}catch(e){}setTimeout(()=>{location.href='index.html?v=0.2.2-fresh-'+Date.now()},900);})();</script></body></html>
