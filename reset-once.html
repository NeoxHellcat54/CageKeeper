<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CageKeeper Reset</title>
  <style>
    :root{--bg:#030305;--panel:#0d0b12;--text:#f4eef8;--muted:#9d92a8;--pink:#e65aa9;--purple:#7d5cff;--gold:#e1b94c;--line:rgba(255,255,255,.12)}
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;background:var(--bg)!important;color:var(--text)!important;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif}
    body{display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 20% 0%,rgba(125,92,255,.12),transparent 32%),radial-gradient(circle at 85% 15%,rgba(230,90,169,.08),transparent 28%),#030305!important}
    .box{max-width:560px;width:100%;border:1px solid var(--line);border-radius:24px;background:linear-gradient(180deg,rgba(18,16,25,.95),rgba(8,7,11,.95));box-shadow:0 20px 80px rgba(0,0,0,.55);padding:28px;text-align:center}
    h1{font-family:Georgia,"Times New Roman",serif;font-weight:500;letter-spacing:.18em;text-transform:uppercase;margin:0 0 10px}.muted{color:var(--muted);line-height:1.5}.status{margin:18px 0;padding:12px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.03);color:var(--gold)}
    button,a{display:inline-flex;align-items:center;justify-content:center;gap:8px;margin:8px;border:1px solid rgba(230,90,169,.35);border-radius:14px;padding:12px 16px;color:#fff;text-decoration:none;background:linear-gradient(135deg,rgba(230,90,169,.22),rgba(125,92,255,.16));cursor:pointer;font:inherit}a.secondary,button.secondary{border-color:var(--line);background:rgba(255,255,255,.04)}
  </style>
</head>
<body>
  <main class="box">
    <h1>CageKeeper</h1>
    <p class="muted">Use this once only if an old cached build is stuck. It will clear service workers and caches, then you can open the app manually.</p>
    <div class="status" id="status">Ready.</div>
    <button id="clearBtn">Clear old cache once</button>
    <a id="openBtn" class="secondary" href="index.html?ck=0.2.3">Open CageKeeper</a>
  </main>
  <script>
    const statusEl = document.getElementById('status');
    document.getElementById('clearBtn').addEventListener('click', async () => {
      statusEl.textContent = 'Clearing…';
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(reg => reg.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(key => caches.delete(key)));
        }
        statusEl.textContent = 'Cleared. Press Open CageKeeper.';
        document.getElementById('openBtn').href = 'index.html?ck=0.2.3-' + Date.now();
      } catch (err) {
        statusEl.textContent = 'Could not clear automatically. Open CageKeeper anyway, or clear site data in the browser.';
      }
    });
  </script>
</body>
</html>
